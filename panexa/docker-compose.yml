version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: panexa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: panexa
      POSTGRES_PASSWORD: panexa123
      POSTGRES_DB: panexa_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U panexa -d panexa_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: panexa-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Evolution API (WhatsApp) ──────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: panexa-evolution
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: panexa-evolution-key
      DATABASE_ENABLED: 'true'
      DATABASE_CONNECTION_URI: postgresql://panexa:panexa123@postgres:5432/evolution_db
      REDIS_ENABLED: 'true'
      REDIS_URI: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_data:/evolution/instances

  # ── Redis Commander (Dev UI) ──────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: panexa-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  postgres_data:
  redis_data:
  evolution_data:
